name: Django CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync
      - name: Black Check
        run: uv run black --check .
      - name: Ruff Check
        run: uv run ruff check .

  test:
    name: Python ${{ matrix.python }} - Django ${{ matrix.django }}
    runs-on: ubuntu-slim
    permissions:
      contents: write
    strategy:
      # If one version fails, don't stop the others
      fail-fast: false
      matrix:
        # If manual, run all
        include: >-
          ${{ github.event_name == 'workflow_dispatch' && fromJSON('[
            {"django": "5.1.*", "python": "3.10"},
            {"django": "5.1.*", "python": "3.11"},
            {"django": "5.1.*", "python": "3.12"},
            {"django": "5.2.*", "python": "3.12"},
            {"django": "5.2.*", "python": "3.13"},
            {"django": "6.0.*", "python": "3.13"},
            {"django": "6.0.*", "python": "3.14"},
            {"django": "latest", "python": "3.14"}
          ]') || fromJSON('[
            {"django": "latest", "python": "3.14"}
          ]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }}

      - name: Install Django ${{ matrix.django }}
        run: |
          if [ "${{ matrix.django }}" == "latest" ]; then
            uv pip install "Django" --upgrade
          else
            uv pip install "Django==${{ matrix.django }}"
          fi
          uv run django-admin --version

      - name: Run Tests
        run: |
          if [ "${{ matrix.python }}" == "3.14" ] && [ "${{ matrix.django }}" == "latest" ]; then
            # Run with coverage on the primary matrix node
            uv run coverage run -m pytest
          else
            # Standard run for others
            uv run pytest
          fi

      - name: Upload Coverage to Coveralls
        # Only upload from the primary matrix node to avoid race conditions/duplicate builds
        if: github.ref == 'refs/heads/master' && matrix.python == '3.14' && matrix.django == 'latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv pip install coveralls
          uv run coveralls
